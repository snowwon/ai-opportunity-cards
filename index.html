<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Opportunity Cards</title>
    <style>
        .card {
            position: absolute; /* Changed to absolute positioning */
            transition: transform 0.5s ease, z-index 0.5s ease; /* Smooth transitions */
        }
    </style>
</head>
<body>
    <div class="card" style="transform: translate(${Math.floor(Math.random() * 601) - 300}px, ${Math.floor(Math.random() * 401) - 200}px) rotate(${Math.floor(Math.random() * 31) - 15}deg); z-index:${Math.floor(Math.random() * 1000)};">
        <!-- Card content goes here -->
    </div>
    <script>
        // Updated JS for random positioning, rotation and z-index
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.style.transform = `translate(${Math.floor(Math.random() * 601) - 300}px, ${Math.floor(Math.random() * 401) - 200}px) rotate(${Math.floor(Math.random() * 31) - 15}deg)`;
            card.style.zIndex = Math.floor(Math.random() * 1000);
        });
    </script>
</body>
</html>
