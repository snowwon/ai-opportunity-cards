<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Opportunity Cards</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/motion@11.11.13/dist/motion.iife.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      :root { --card-radius: 18px; }
      body { overflow-x: hidden; background-color: #020617; }
      .cards-container { position: relative; width: 100%; min-height: 800px; }
      
      /* Flip Effect */
      .flip { perspective: 1200px; }
      .flip__inner {
        position: relative; width: 100%; h-full;
        transform-style: preserve-3d;
        transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .flip.is-flipped .flip__inner { transform: rotateY(180deg); }
      .flip__face { 
        position: absolute; inset: 0; 
        backface-visibility: hidden; -webkit-backface-visibility: hidden; 
      }
      .flip__back { transform: rotateY(180deg); }

      /* Card Shell Base Styling */
      .card-shell {
        position: absolute;
        width: 300px; height: 400px;
        cursor: grab;
        user-select: none;
        will-change: transform, opacity;
      }
      .card-shell:active { cursor: grabbing; }
    </style>
  </head>

  <body class="text-slate-100 font-sans">
    <div class="min-h-screen">
      <header class="sticky top-0 z-50 border-b border-white/10 bg-slate-950/80 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
          <div class="flex items-center gap-3">
            <div class="grid h-9 w-9 place-items-center rounded-xl bg-gradient-to-tr from-fuchsia-500 to-cyan-400 text-slate-950 font-bold">AI</div>
            <div>
              <div class="text-sm font-semibold uppercase tracking-wide">AI Opportunity Cards</div>
              <div class="text-[10px] text-slate-400">NUS UX Lab • Drag to Arrange</div>
            </div>
          </div>
          <div class="flex gap-2">
            <button id="stackBtn" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl text-sm font-medium transition-all">Stack</button>
            <button id="alignBtn" class="bg-gradient-to-tr from-fuchsia-500 to-cyan-400 text-slate-950 px-4 py-2 rounded-xl text-sm font-bold hover:opacity-90">Align</button>
          </div>
        </div>
      </header>

      <main class="mx-auto grid max-w-7xl grid-cols-1 gap-6 px-4 py-6 md:grid-cols-[240px_1fr]">
        <aside class="space-y-4">
          <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
            <div class="flex justify-between items-center mb-4 text-xs font-bold text-slate-400 uppercase tracking-widest">
              <span>Categories</span>
              <button onclick="clearFilters()" class="text-cyan-400 hover:underline">Clear</button>
            </div>
            <div id="sidebarFilters" class="space-y-2"></div>
          </div>
        </aside>

        <section id="cardsGrid" class="cards-container">
          </section>
      </main>
    </div>

    <template id="cardTemplate">
      <div class="card-shell flip">
        <div class="flip__inner h-full w-full">
          <div class="flip__face rounded-[var(--card-radius)] border border-white/10 overflow-hidden bg-slate-900 shadow-2xl">
            <img class="w-full h-full object-cover" data-slot="frontImage" draggable="false">
          </div>
          <div class="flip__face flip__back rounded-[var(--card-radius)] border border-white/10 overflow-hidden bg-slate-950 shadow-2xl">
            <img class="w-full h-full object-cover" data-slot="backImage" draggable="false">
          </div>
        </div>
      </div>
    </template>

    <script>
      const IMG_BASE = "./images/";
      const CARD_DATA = [
        { id: "1", category: "personalization", title: "AI Personalization", front: "1_AI Personalization_Front.png", back: "1_AI Personalization_Back.png" },
        { id: "2", category: "personalization", title: "Onboarding", front: "2_Onboarding for Personalization_Front.png", back: "2_Onboarding for Personalization_Back.png" },
        { id: "3", category: "personalization", title: "App Features", front: "3_AI-powered App-specific Feature_Front.png", back: "3_AI-powered App-specific Feature_Back.png" },
        { id: "4", category: "guidance", title: "AI Nudge", front: "4_AI Nudge_Notification_Front.png", back: "4_AI Nudge_Notification_Back.png" },
        { id: "5", category: "guidance", title: "AI Recommendation", front: "5_AI Recommendation _ AI Action Items_Front.png", back: "5_AI Recommendation _ AI Action Items_Back.png" },
        { id: "6", category: "guidance", title: "AI Projection", front: "6_AI Projection_Front.png", back: "6_AI Projection_Back.png" },
        { id: "7", category: "content", title: "Auto-fill", front: "7_AI Context Aware Auto-fill_Front.png", back: "7_AI Context Aware Auto-fill_Back.png" },
        { id: "8", category: "content", title: "Sketch-to-Concept", front: "8_AI Sketch-to-Concept_Front.png", back: "8_AI Sketch-to-Concept_Back.png" },
        { id: "9", category: "content", title: "NLU", front: "9_AI-powered Natural Language Understanding_Front.png", back: "9_AI-powered Natural Language Understanding_Back.png" },
        { id: "10", category: "knowledge", title: "AI Summary", front: "10_AI Summary_Front.png", back: "10_AI Summary_Back.png" },
        { id: "11", category: "knowledge", title: "Knowledge Sharing", front: "11_AI Knowledge Sharing Platform_Front.png", back: "11_AI Knowledge Sharing Platform_Back.png" },
        { id: "12", category: "knowledge", title: "Data Organization", front: "12_AI-powered Data Organization_Front.png", back: "12_AI-powered Data Organization_Back.png" }
      ];

      const CATEGORIES = {
        personalization: { name: "Personalization", color: "text-emerald-400", bg: "bg-emerald-400/10" },
        guidance: { name: "Guidance", color: "text-rose-400", bg: "bg-rose-400/10" },
        content: { name: "Content", color: "text-violet-400", bg: "bg-violet-400/10" },
        knowledge: { name: "Knowledge", color: "text-sky-400", bg: "bg-sky-400/10" }
      };

      let activeCategory = null;
      let cardObjects = [];

      function init() {
        renderSidebar();
        createCards();
        setTimeout(() => alignGrid(false), 100); // 렌더링 후 좌표 계산을 위한 미세 지연
        if(window.lucide) lucide.createIcons();
      }

      function renderSidebar() {
        const container = document.getElementById('sidebarFilters');
        container.innerHTML = Object.entries(CATEGORIES).map(([key, cat]) => `
          <button onclick="filterCategory('${key}')" class="w-full text-left p-3 rounded-xl border border-white/5 ${cat.bg} hover:border-white/20 transition-all">
            <div class="text-[11px] font-black uppercase tracking-widest ${cat.color}">${cat.name}</div>
          </button>
        `).join('');
      }

      function createCards() {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';
        cardObjects = CARD_DATA.map((card, i) => {
          const temp = document.getElementById('cardTemplate').content.cloneNode(true);
          const el = temp.querySelector('.card-shell');
          el.querySelector('[data-slot="frontImage"]').src = IMG_BASE + encodeURIComponent(card.front);
          el.querySelector('[data-slot="backImage"]').src = IMG_BASE + encodeURIComponent(card.back);
          
          grid.appendChild(temp);

          // 드래그 및 클릭 상호작용 (Motion 라이브러리 활용)
          const { animate, drag } = window.Motion;
          
          drag(el, {
            onDragStart: () => { el.style.zIndex = 1000; },
            onDragEnd: () => { el.style.zIndex = i + 1; }
          });

          el.addEventListener('click', (e) => {
            // 드래그와 클릭을 구분하기 위해 미세한 움직임이 없었을 때만 뒤집기
            el.classList.toggle('is-flipped');
          });

          return { el, category: card.category, index: i };
        });
      }

      function filterCategory(key) {
        activeCategory = key;
        alignGrid(true);
      }

      function clearFilters() {
        activeCategory = null;
        alignGrid(true);
      }

      function alignGrid(animated = true) {
        const { animate } = window.Motion;
        const GAP = 20;
        const COL_W = 320;
        const ROW_H = 420;
        
        let visibleIdx = 0;
        cardObjects.forEach((obj) => {
          const isVisible = activeCategory ? obj.category === activeCategory : true;
          
          if (isVisible) {
            const col = visibleIdx % 3;
            const row = Math.floor(visibleIdx / 3);
            const targetX = col * COL_W;
            const targetY = row * ROW_H;

            animate(obj.el, { 
              x: targetX, y: targetY, rotate: 0, opacity: 1, scale: 1 
            }, { duration: animated ? 0.6 : 0, easing: [0.23, 1, 0.32, 1] });
            
            obj.el.style.pointerEvents = 'auto';
            visibleIdx++;
          } else {
            animate(obj.el, { opacity: 0, scale: 0.8 }, { duration: 0.4 });
            obj.el.style.pointerEvents = 'none';
          }
        });
      }

      document.getElementById('stackBtn').onclick = () => {
        const { animate } = window.Motion;
        const W = document.getElementById('cardsGrid').offsetWidth - 300;
        
        cardObjects.forEach((obj, i) => {
          const tx = Math.random() * W;
          const ty = Math.random() * 300;
          const tr = Math.random() * 40 - 20;

          animate(obj.el, { 
            x: tx, y: ty, rotate: tr, opacity: 1, scale: 1 
          }, { duration: 0.7, easing: [0.23, 1, 0.32, 1] });
        });
      };

      document.getElementById('alignBtn').onclick = () => clearFilters();

      window.addEventListener('load', init);
    </script>
  </body>
</html>
